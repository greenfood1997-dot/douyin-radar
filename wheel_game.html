<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Wheel Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px 0;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }
        .btn-spin {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin: 20px 0;
        }
        .btn-spin:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            background: white;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .result-text {
            font-size: 24px;
            color: #764ba2;
            font-weight: bold;
        }
        .settings {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
        }
        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .item-tag {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        .add-item {
            display: flex;
            gap: 10px;
        }
        .add-item input {
            flex: 1;
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 20px;
        }
        .add-item button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .presets {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preset-btn {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <h1>Wheel Game</h1>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="center-circle"></div>
    </div>
    
    <button class="btn-spin" id="spinBtn" onclick="spin()">SPIN</button>
    
    <div class="result" id="result">
        <div class="result-text" id="resultText">-</div>
    </div>
    
    <div class="settings">
        <h3>Settings</h3>
        <div class="item-list" id="itemList"></div>
        <div class="add-item">
            <input type="text" id="newItem" placeholder="Add item..." maxlength="20">
            <button onclick="addItem()">Add</button>
        </div>
        <div class="presets">
            <button class="preset-btn" onclick="loadPreset('default')">Default</button>
            <button class="preset-btn" onclick="loadPreset('food')">Food</button>
            <button class="preset-btn" onclick="loadPreset('activity')">Activity</button>
        </div>
    </div>

    <script>
        const presets = {
            default: ['Prize 1', 'Prize 2', 'Prize 3', 'Try Again', 'Bonus', 'Lucky'],
            food: ['Hot Pot', 'BBQ', 'Sushi', 'Pizza', 'Burger', 'Noodles'],
            activity: ['Movie', 'Shopping', 'Sports', 'Game', 'Read', 'Sleep']
        };
        
        let items = [...presets.default];
        let isSpinning = false;
        let currentRotation = 0;
        
        const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#fa709a', '#fee140', '#30cfd0'];
        
        function renderWheel() {
            const wheel = document.getElementById('wheel');
            const angle = 360 / items.length;
            wheel.style.background = `conic-gradient(${items.map((_, i) => `${colors[i % colors.length]} ${i * angle}deg ${(i + 1) * angle}deg`).join(', ')})`;
        }
        
        function renderItemList() {
            const list = document.getElementById('itemList');
            list.innerHTML = items.map((item, index) => `
                <div class="item-tag" style="background: ${colors[index % colors.length]}">
                    ${item} <span onclick="removeItem(${index})" style="cursor:pointer;margin-left:5px;">x</span>
                </div>
            `).join('');
        }
        
        function spin() {
            if (isSpinning || items.length < 2) return;
            
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('result').style.display = 'none';
            
            const wheel = document.getElementById('wheel');
            const randomIndex = Math.floor(Math.random() * items.length);
            const anglePerItem = 360 / items.length;
            const targetAngle = 360 - (randomIndex * anglePerItem + anglePerItem / 2);
            const spins = 5 + Math.floor(Math.random() * 3);
            const finalRotation = currentRotation + spins * 360 + targetAngle;
            
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            currentRotation = finalRotation;
            
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                document.getElementById('resultText').textContent = items[randomIndex];
                document.getElementById('result').style.display = 'block';
            }, 4000);
        }
        
        function addItem() {
            const input = document.getElementById('newItem');
            const value = input.value.trim();
            if (value && items.length < 12) {
                items.push(value);
                input.value = '';
                renderWheel();
                renderItemList();
            }
        }
        
        function removeItem(index) {
            if (items.length > 2) {
                items.splice(index, 1);
                renderWheel();
                renderItemList();
            }
        }
        
        function loadPreset(name) {
            items = [...presets[name]];
            renderWheel();
            renderItemList();
        }
        
        document.getElementById('newItem').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });
        
        renderWheel();
        renderItemList();
    </script>
</body>
</html>
